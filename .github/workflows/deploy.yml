name: Test and Deploy Register

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: register-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Django Tests
    runs-on: ubuntu-latest

    env:
      DJANGO_SECRET_KEY: ci-only-secret-key
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver

      DB_ENGINE: sqlite
      SQLITE_NAME: test.sqlite3

      SMS_SEND_ASYNC: "false"
      KAVENEGAR_API_KEY: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            pkg-config \
            default-libmysqlclient-dev \
            fonts-dejavu-core

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Run tests
        run: python manage.py test --verbosity=2


  deploy:
    name: Deploy to Chabokan
    runs-on: ubuntu-latest

    needs:
      - test

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify project root
        run: |
          test -f manage.py
          test -f requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Chabokan CLI
        run: npm install -g @chabokan.net/cli

      - name: Login to Chabokan
        run: chabok login -t "${{ secrets.TOKEN }}"

      - name: Deploy project root
        working-directory: .
        run: chabok deploy -s register
